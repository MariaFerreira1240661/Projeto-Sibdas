<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedControl</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="../assets/img/medcontrol-logo1.png" type="image/png">

    <!-- Bootstrap -->
    <link href="../assets/bootstrap/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="../assets/bootstrap/bootstrap-icons.min.css">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../assets/css/1240661.css">
</head>
<body class="login-body">

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/img/medcontrol-logo1.png" alt="Logótipo da MedControl">
                <h1>MedControl</h1>
            </div>

            <h2>Área Reservada</h2>
            <p>Introduza os seus dados para aceder ao sistema.</p>
       
        <form id="form-login">
            <div class="mb-3">
                <label for="utilizador" class="form-label">Utilizador</label>
                <input type="text" class="form-control" id="utilizador" placeholder="Nome de utilizador">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Palavra-passe</label>
                <input type="password" class="form-control" id="password" placeholder="Palavra-passe">
            </div>

            <button type="submit" class="btn-login">Entrar</button>
            <p id="mensagem-login" class="mensagem-login"></p>
        </form>

                 <a href="../public/index.html" class="voltar-site">Voltar ao site público</a>
            
        </div>
           
    </main>

     <!-- Bootstrap JS -->
    <script src="../assets/bootstrap/bootstrap.bundle.min.js"></script>
     <!-- JavaScript do projeto -->
    <script src="../assets/js/1240661.js"></script>


</body>
</html>
