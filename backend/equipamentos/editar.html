<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Equipamento - MedControl</title>

    <link rel="shortcut icon" href="../../assets/img/medcontrol_logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/estilo.css">
</head>

<body class="backend-body">

    <div class="backend-layout">

        <aside class="backend-sidebar">
            <div class="sidebar-logo">
                <img src="../../assets/img/medcontrol_logo.png" alt="Logótipo da MedControl">
                <h2>MedControl</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="../index.html">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>

                <a href="index.html" class="ativo">
                    <i class="bi bi-hospital"></i>
                    <span>Equipamentos</span>
                </a>

                <a href="../localizacoes/index.html">
                    <i class="bi bi-geo-alt"></i>
                    <span>Localizações</span>
                </a>

                <a href="../fornecedores/index.html">
                    <i class="bi bi-truck"></i>
                    <span>Fornecedores</span>
                </a>

                <a href="../documentacao/index.html">
                    <i class="bi bi-file-earmark-text"></i>
                    <span>Documentação</span>
                </a>

                <a href="../contratos/index.html">
                    <i class="bi bi-shield-check"></i>
                    <span>Contratos</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../../frontend/index.html">
                    <i class="bi bi-box-arrow-left"></i>
                    <span>Site Público</span>
                </a>
            </div>
        </aside>

        <main class="backend-content">

            <div class="backend-topbar">
                <div>
                    <h1>Editar Equipamento</h1>
                    <p>Atualização dos dados de um equipamento médico existente.</p>
                </div>

                <div class="backend-user">
                    <i class="bi bi-person-circle"></i>
                    <span>Administrador</span>
                </div>
            </div>

            <section class="backend-box">
                <div class="backend-section-header">
                    <div>
                        <h2>Dados do Equipamento</h2>
                        <p>Altere os campos necessários e guarde as alterações.</p>
                    </div>

                    <a href="index.html" class="btn-backend">
                        <i class="bi bi-arrow-left-circle"></i>
                        Voltar à listagem
                    </a>
                </div>

                <form class="form-backend" id="formEditarEquipamento">

                    <div class="form-grid">
                        <div>
                            <label for="editCodigo">Código interno *</label>
                            <input type="text" id="editCodigo" value="EQ001">
                        </div>

                        <div>
                            <label for="editDesignacao">Designação *</label>
                            <input type="text" id="editDesignacao" value="Monitor Multiparamétrico">
                        </div>

                        <div>
                            <label for="editCategoria">Categoria *</label>
                            <select id="editCategoria">
                                <option selected>Monitorização</option>
                                <option>Suporte de vida</option>
                                <option>Terapia</option>
                                <option>Diagnóstico</option>
                                <option>Laboratório</option>
                                <option>Esterilização</option>
                            </select>
                        </div>

                        <div>
                            <label for="editMarca">Marca *</label>
                            <input type="text" id="editMarca" value="Philips">
                        </div>

                        <div>
                            <label for="editModelo">Modelo *</label>
                            <input type="text" id="editModelo" value="IntelliVue MP5">
                        </div>

                        <div>
                            <label for="editSerie">Número de série *</label>
                            <input type="text" id="editSerie" value="MP5-2022-45873">
                        </div>

                        <div>
                            <label for="editFabricante">Fabricante</label>
                            <input type="text" id="editFabricante" value="Philips Healthcare">
                        </div>

                        <div>
                            <label for="editLocalizacao">Localização *</label>
                            <select id="editLocalizacao">
                                <option selected>UCI</option>
                                <option>Bloco Operatório</option>
                                <option>Medicina Interna</option>
                                <option>Urgência</option>
                                <option>Imagiologia</option>
                            </select>
                        </div>

                        <div>
                            <label for="editEstado">Estado atual *</label>
                            <select id="editEstado">
                                <option selected>Ativo</option>
                                <option>Em manutenção</option>
                                <option>Inativo</option>
                                <option>Em calibração</option>
                                <option>Em quarentena</option>
                                <option>Abatido</option>
                            </select>
                        </div>

                        <div>
                            <label for="editCriticidade">Criticidade *</label>
                            <select id="editCriticidade">
                                <option selected>Suporte de vida</option>
                                <option>Alta</option>
                                <option>Média</option>
                                <option>Baixa</option>
                            </select>
                        </div>

                        <div>
                            <label for="editDataAquisicao">Data de aquisição</label>
                            <input type="date" id="editDataAquisicao" value="2022-02-12">
                        </div>

                        <div>
                            <label for="editAnoFabrico">Ano de fabrico</label>
                            <input type="number" id="editAnoFabrico" value="2022">
                        </div>

                        <div>
                            <label for="editCusto">Custo de aquisição</label>
                            <input type="number" id="editCusto" value="4850">
                        </div>

                        <div>
                            <label for="editTipoEntrada">Tipo de entrada</label>
                            <select id="editTipoEntrada">
                                <option selected>Compra</option>
                                <option>Doação</option>
                                <option>Aluguer</option>
                                <option>Empréstimo</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-full">
                        <label for="editObservacoes">Observações</label>
                        <textarea id="editObservacoes" rows="4">Equipamento utilizado para monitorização contínua de sinais vitais em ambiente hospitalar.</textarea>
                    </div>

                    <p id="mensagemEditarEquipamento" class="mensagem-login"></p>

                    <div class="form-botoes">
                        <button type="submit" class="btn-backend">
                            <i class="bi bi-check-circle"></i>
                            Guardar alterações
                        </button>

                        <a href="index.html" class="btn-secundario">
                            Cancelar
                        </a>
                    </div>

                </form>
            </section>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/script.js"></script>

</body>
</html>
